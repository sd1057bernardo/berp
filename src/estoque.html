<div class="container pt-3">
    <h2 class="mb-4 fw-bold">Gestão de Estoque</h2>

    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card p-3">
                <h5>Registrar Movimento</h5>
                <form id="formMov">
                    <label class="form-label small mt-2">Produto (nome ou código)</label>
                    <div style="position:relative">
                        <input id="mov-produto" class="form-control" placeholder="Digite nome ou código e selecione" autocomplete="off" />
                        <!-- autocomplete container -->
                        <div id="ac-list" style="display:none;position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid #ddd;box-shadow:0 6px 18px rgba(0,0,0,0.08);z-index:1050;max-height:260px;overflow:auto;border-radius:4px"></div>
                    </div>

                    <label class="form-label small mt-2">Tipo</label>
                    <select id="mov-tipo" class="form-select">
                        <option value="ENTRADA">Entrada</option>
                        <option value="SAIDA">Saída</option>
                    </select>

                    <label class="form-label small mt-2">Quantidade</label>
                    <input id="mov-quant" type="number" step="0.01" min="0.01" class="form-control" />

                    <label class="form-label small mt-2">Preço (unitário)</label>
                    <input id="mov-preco" type="number" step="0.01" min="0" class="form-control" />

                    <label class="form-label small mt-2">Descrição</label>
                    <input id="mov-desc" class="form-control" placeholder="Ex: Compra fornecedor X / Ajuste manual" />

                    <div class="d-flex gap-2 justify-content-end mt-3">
                        <button id="mov-reset" class="btn btn-secondary">Limpar</button>
                        <button id="mov-save" class="btn btn-primary">Salvar Movimento</button>
                    </div>
                </form>
                <div id="mov-status" class="small text-muted mt-2"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Consulta e Cancelamento</h5>
                <label class="form-label small mt-2">Filtrar</label>
                <div class="d-flex gap-2">
                    <input id="mov-filtro" class="form-control" placeholder="Digite nome/código/descrição" />
                    <button id="btn-hoje" class="btn btn-outline-primary">Hoje</button>
                </div>
                <div class="mt-3" id="mov-list" style="max-height:420px;overflow:auto"></div>
            </div>
        </div>
    </div>
</div>

<script>
(async ()=>{
    const { ipcRenderer } = require('electron');

    function showToast(message, type='info'){
        try{
            const container = document.querySelector('#pdv-toasts') || (()=>{ const c=document.createElement('div'); c.id='pdv-toasts'; document.body.appendChild(c); return c; })();
            const t = document.createElement('div'); t.className = `toast align-items-center text-bg-${type} border-0`; t.setAttribute('role','alert'); t.setAttribute('aria-live','assertive'); t.setAttribute('aria-atomic','true');
            t.innerHTML = `<div class="d-flex"><div class="toast-body">${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button></div>`;
            container.appendChild(t);
            const bs = new bootstrap.Toast(t, { delay: 4000 }); bs.show();
        }catch(e){ console.warn('Toast failed', e); }
    }

    // refs
    const prodInput = document.getElementById('mov-produto');
    const acList = document.getElementById('ac-list');
    const tipoInput = document.getElementById('mov-tipo');
    const quantInput = document.getElementById('mov-quant');
    const precoInput = document.getElementById('mov-preco');
    const descInput = document.getElementById('mov-desc');
    const movSave = document.getElementById('mov-save');
    const movReset = document.getElementById('mov-reset');
    const status = document.getElementById('mov-status');
    const filtro = document.getElementById('mov-filtro');
    const movList = document.getElementById('mov-list');

    let selectedProduto = null; // { ID, Descricao, 'C.Barra' }

    // busca produtos (reusa handler existente)
    async function buscaProdutos(q){
        try{ return await ipcRenderer.invoke('get-produtos', q||''); }catch(e){
            console.error('Erro IPC get-produtos:', e);
            status.innerText = 'Erro de comunicação (get-produtos). Reinicie o app.';
            return [];
        }
    }

    // autocomplete simples
    let acTimer;
    prodInput.addEventListener('input', ()=>{
        clearTimeout(acTimer);
        const q = prodInput.value.trim();
        if(!q || q.length<2) return;
        acTimer = setTimeout(async ()=>{
            const res = await buscaProdutos(q);
            showAutocomplete(res);
        },250);
    });
    function showAutocomplete(items){
        acList.innerHTML = '';
        if(!items || items.length===0){ acList.style.display = 'none'; return; }
        items.slice(0,8).forEach(it=>{
            const d = document.createElement('div');
            d.className = 'p-2';
            d.style.cursor = 'pointer';
            d.innerHTML = `<div class="fw-bold">${it.Descricao}</div><div class='small text-muted'>${it['C.Barra']||''} • R$ ${Number(it['P.Venda']||0).toFixed(2)}</div>`;
            d.addEventListener('click', ()=>{
                selectedProduto = it;
                prodInput.value = it.Descricao + (it['C.Barra']?(' | '+it['C.Barra']):'');
                acList.style.display = 'none';
            });
            d.addEventListener('mouseenter', ()=> d.classList.add('bg-light'));
            d.addEventListener('mouseleave', ()=> d.classList.remove('bg-light'));
            acList.appendChild(d);
        });
        acList.style.display = 'block';
    }

    // fechar autocomplete ao perder foco (com delay se for para clicar em item)
    prodInput.addEventListener('blur', ()=> setTimeout(()=> acList.style.display = 'none', 150));
    prodInput.addEventListener('focus', ()=>{
        if(acList.childElementCount>0) acList.style.display = 'block';
    });

    movReset.addEventListener('click',(e)=>{ e.preventDefault(); document.getElementById('formMov').reset(); selectedProduto = null; document.getElementById('ac-list')?.remove(); status.innerText=''; });

    movSave.addEventListener('click', async (e)=>{
        e.preventDefault();
        if(!selectedProduto){ status.innerText = 'Selecione um produto válido (use o autocomplete)'; return; }
        const quantidade = parseFloat(quantInput.value) || 0;
        if(quantidade <= 0){ status.innerText = 'Informe quantidade maior que 0'; return; }
        const preco = parseFloat(precoInput.value) || 0;
        const mov = {
            ProdutoID: selectedProduto.ID || selectedProduto.Id || selectedProduto.id,
            Tipo: tipoInput.value,
            Quantidade: quantidade,
            Preco: preco,
            Descricao: descInput.value || ''
        };
        try{
            const res = await ipcRenderer.invoke('save-estoque-movimento', mov);
            if(res && res.success){
                status.innerText = 'Movimento salvo com sucesso (ID '+res.id+')';
                document.getElementById('formMov').reset(); selectedProduto = null; document.getElementById('ac-list')?.remove();
                carregarLista();
            } else if(res && res.error){
                status.innerText = 'Erro ao salvar movimento: ' + res.error;
            } else {
                status.innerText = 'Erro ao salvar movimento (verifique o backend)';
            }
        }catch(err){ console.error('Erro IPC save-estoque-movimento:', err); status.innerText = 'Erro de comunicação (save-estoque-movimento). Reinicie o app.'; }
    });

    // listar movimentos
    async function carregarLista(){
        const q = filtro.value.trim();
        let rows = [];
        try{
            rows = await ipcRenderer.invoke('get-estoque-movimentos', q);
        }catch(err){
            console.error('Erro IPC get-estoque-movimentos:', err);
            movList.innerHTML = `<div class="p-2 small text-danger">Erro ao carregar movimentos (backend não disponível). Reinicie o app.</div>`;
            return;
        }
        movList.innerHTML = rows.map(r=>{
            return `
                <div class="p-2 border-bottom d-flex justify-content-between align-items-start">
                    <div>
                        <div><strong>${r.ProdutoDescricao||r.ProdutoID||'Produto #' + r.ProdutoID}</strong> <small class="text-muted">${r.CBarra||''}</small></div>
                        <div class="small text-muted">${r.Tipo} • ${r.Quantidade} un • R$ ${Number(r.Preco||0).toFixed(2)}</div>
                        <div class="small">${r.Descricao||''}</div>
                        <div class="small text-muted">${r.DataHora}</div>
                        ${r.Cancelado ? `<div class='text-danger small'>CANCELADO: ${r.CancelObs || ''} em ${r.CancelData}</div>` : ''}
                    </div>
                    <div style="min-width:110px;text-align:right">
                        ${r.Cancelado ? '' : `<button class='btn btn-danger btn-sm' data-id='${r.ID}'>Cancelar</button>`}
                    </div>
                </div>
            `;
        }).join('') || '<div class="p-2 small text-muted">Nenhum movimento encontrado</div>';

        // ligar eventos de cancelamento
        movList.querySelectorAll('button[data-id]').forEach(b=> b.addEventListener('click', async ()=>{
            const id = b.getAttribute('data-id');
                            // modal para motivo
                            const modalHtml = `
                            <div class="modal fade" id="motivoModal" tabindex="-1">
                                <div class="modal-dialog modal-sm modal-dialog-centered">
                                    <div class="modal-content">
                                        <div class="modal-header"><h5 class="modal-title">Motivo do cancelamento</h5></div>
                                        <div class="modal-body">
                                            <textarea id="motivo-text" class="form-control" rows="3"></textarea>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                            <button type="button" id="motivo-confirm" class="btn btn-danger">Confirmar cancelamento</button>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                            const wrapper = document.createElement('div'); wrapper.innerHTML = modalHtml; document.body.appendChild(wrapper);
                            const modalEl = document.getElementById('motivoModal');
                            const m = new bootstrap.Modal(modalEl);
                            m.show();
                    document.getElementById('motivo-confirm').addEventListener('click', async ()=>{
                                const motivo = document.getElementById('motivo-text').value.trim();
                                if(!motivo) return;
                                const r = await ipcRenderer.invoke('cancel-estoque-movimento', parseInt(id), motivo);
                                if(r && r.success){ carregarLista(); showToast('Cancelado','success'); } else showToast('Erro: '+(r?.error||''),'danger');
                                m.hide();
                            });
        }));
    }

    filtro.addEventListener('input', ()=>{ clearTimeout(acTimer); acTimer = setTimeout(()=> carregarLista(),300); });

    // botao HOJE
    const btnHoje = document.getElementById('btn-hoje');
    btnHoje.addEventListener('click', (e)=>{ e.preventDefault(); carregarLista({ hoje: true }); });

    // initial load
    carregarLista();
})();
</script>
