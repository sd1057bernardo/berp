<div class="container-fluid pt-3">
    <h2 className="mb-4 fw-bold">Painel de Controle</h2>
    
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 border-start border-primary border-4">
                <p class="text-muted mb-0 small text-uppercase fw-bold">Vendas Hoje</p>
                <h3 class="fw-bold mb-0" id="dash-vendas-hoje">R$ 0,00</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 border-start border-success border-4">
                <p class="text-muted mb-0 small text-uppercase fw-bold">Pedidos</p>
                <h3 class="fw-bold mb-0" id="dash-qtd-vendas">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 border-start border-warning border-4">
                <p class="text-muted mb-0 small text-uppercase fw-bold">Itens no Estoque</p>
                <h3 class="fw-bold mb-0" id="dash-estoque-total">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 border-start border-danger border-4">
                <p class="text-muted mb-0 small text-uppercase fw-bold">Abaixo do Mínimo</p>
                <h3 class="fw-bold mb-0 text-danger" id="dash-estoque-baixo">0</h3>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm p-4">
                <h5 class="fw-bold mb-3">Vendas nos Últimos 7 Dias</h5>
                <canvas id="graficoVendas" style="max-height: 300px;"></canvas>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4 h-100">
                <h5 class="fw-bold mb-3">Produtos Críticos</h5>
                <div class="list-group list-group-flush" id="lista-estoque-critico">
                    <small class="text-muted text-center">Carregando dados...</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (async () => {
        const { ipcRenderer } = require('electron');

        // Carrega Chart.js dinamicamente e com timeout
        function loadChartCDN() {
            return new Promise((resolve) => {
                if (window.Chart) return resolve(true);
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/chart.js';
                s.onload = () => resolve(true);
                s.onerror = () => resolve(false);
                document.head.appendChild(s);
                setTimeout(() => resolve(!!window.Chart), 3000);
            });
        }

        // 1. Buscar dados do Backend
        try {
            const stats = await ipcRenderer.invoke('get-estatisticas-dashboard');
            
            // 2. Atualizar Cards
            document.getElementById('dash-vendas-hoje').innerText = `R$ ${stats.vendasHoje.toFixed(2)}`;
            document.getElementById('dash-qtd-vendas').innerText = stats.qtdVendas;
            document.getElementById('dash-estoque-total').innerText = stats.totalItens;
            document.getElementById('dash-estoque-baixo').innerText = stats.totalAbaixoMinimo;

            // 3. Montar Lista de Estoque Crítico
            const lista = document.getElementById('lista-estoque-critico');
            lista.innerHTML = (stats.itensCriticos || []).map(item => `
                <div class="list-group-item d-flex justify-content-between align-items-center px-0">
                    <span>${item.Descricao}</span>
                    <span class="badge bg-danger rounded-pill">${(item.EstoqueAtual || 0)} un</span>
                </div>
            `).join('') || '<p class="text-success small">Estoque em dia!</p>';

            // 4. Gerar Gráfico se Chart disponível
            const chartLoaded = await loadChartCDN();
            if (chartLoaded && window.Chart) {
                try {
                    const ctx = document.getElementById('graficoVendas').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: stats.graficoLabels || [],
                            datasets: [{
                                label: 'Vendas R$',
                                data: stats.graficoValores || [],
                                backgroundColor: '#0d6efd',
                                borderRadius: 5
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: { y: { beginAtZero: true, grid: { display: false } } }
                        }
                    });
                } catch(e) {
                    console.error('Erro ao desenhar gráfico:', e);
                }
            } else {
                console.warn('Chart.js não carregado — gráfico será omitido.');
            }
        } catch (err) {
            console.error("Falha ao carregar dashboard:", err);
        }
    })();
</script>
