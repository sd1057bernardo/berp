<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BERP - Sistema Modular</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 220px; }
        body { background-color: #f4f7f6; overflow: hidden; display: flex; }
        .sidebar { width: var(--sidebar-width); height: 100vh; background: #1a1d20; color: white; position: fixed; }
        .nav-link { color: #adb5bd !important; cursor: pointer; margin: 5px 10px; border-radius: 5px; }
        .nav-link.active { background: #0d6efd !important; color: white !important; }
        main { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); height: 100vh; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<nav class="sidebar p-3">
    <h4 class="text-center text-primary mb-4">BERP</h4>
	<ul class="nav flex-column">
		<li class="nav-item"><a class="nav-link active" onclick="navegar('inicio')"><i class="bi bi-house-door me-2"></i>Início</a></li>
		<li class="nav-item"><a class="nav-link" onclick="navegar('produtos')"><i class="bi bi-box-seam me-2"></i>Produtos</a></li>
		<li class="nav-item"><a class="nav-link" onclick="navegar('clientes')"><i class="bi bi-person-badge me-2"></i>Clientes</a></li>
		<li class="nav-item"><a class="nav-link" onclick="navegar('vendas')"><i class="bi bi-cart4 me-2"></i>Vendas</a></li>
		<li class="nav-item"><a class="nav-link" onclick="navegar('ajustesprecos')"><i class="bi bi-tags me-2"></i>Ajustes Preços</a></li>
		<li class="nav-item"><a class="nav-link" onclick="navegar('relatorios')"><i class="bi bi-bar-chart-line me-2"></i>Relatórios</a></li>
	</ul>
</nav>

<main id="conteudo-dinamico">
    </main>

<script>
    const fs = require('fs');
    const path = require('path');

    function logger(msg, tipo = 'info') {
        console.log(`%c[DEBUG] ${msg}`, `color: ${tipo === 'error' ? 'red' : 'cyan'}`);
    }

    async function navegar(pagina) {
        logger(`Navegando para: ${pagina}`);

        // 1. Atualizar visual do menu
        document.querySelectorAll('.nav-link').forEach(l => {
            l.classList.remove('active');
            if(l.innerText.toLowerCase().includes(pagina)) l.classList.add('active');
        });

        // 2. Definir caminho do arquivo (na mesma pasta src)
        const caminhoArquivo = path.join(__dirname, `${pagina}.html`);

        try {
            if (fs.existsSync(caminhoArquivo)) {
                const html = fs.readFileSync(caminhoArquivo, 'utf-8');
                const container = document.getElementById('conteudo-dinamico');
                
                // Injetar o HTML
                container.innerHTML = html;

                // 3. FORÇAR EXECUÇÃO DE SCRIPTS
                // O innerHTML não executa <script> por segurança, então fazemos manualmente:
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript).parentNode.removeChild(newScript);
                });

                logger(`Página ${pagina}.html carregada!`, 'success');
            } else {
                throw new Error("Arquivo não encontrado");
            }
        } catch (err) {
            logger(`Erro: ${err.message}`, 'error');
            document.getElementById('conteudo-dinamico').innerHTML = `<h1>Erro 404</h1><p>${pagina}.html não encontrado.</p>`;
        }
    }

    // Carregar página inicial
    window.onload = () => navegar('inicio');
</script>
</body>
</html>
