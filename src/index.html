<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BERP - Sistema Modular</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 220px; }
        body { background-color: #f4f7f6; overflow: hidden; display: flex; margin: 0; }
        .sidebar { width: var(--sidebar-width); height: 100vh; background: #1a1d20; color: white; position: fixed; }
        .nav-link { color: #adb5bd !important; cursor: pointer; margin: 5px 10px; border-radius: 5px; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); }
        .nav-link.active { background: #0d6efd !important; color: white !important; }
        main { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); height: 100vh; padding: 20px; overflow-y: auto; }
        /* PDV mode: esconde sidebar e usa toda a largura */
        body.pdv-mode .sidebar { display: none; }
        body.pdv-mode main { margin-left: 0; width: 100%; }
    </style>
</head>
<body>

<nav class="sidebar p-3">
    <h4 class="text-center text-primary mb-4">BERP</h4>
    <ul class="nav flex-column" id="menu-principal">
        <li class="nav-item"><a class="nav-link active" onclick="navegar('inicio', this)"><i class="bi bi-house-door me-2"></i>Início</a></li>
        <li class="nav-item"><a class="nav-link" onclick="navegar('Produtos', this)"><i class="bi bi-box-seam me-2"></i>Produtos</a></li>
        <li class="nav-item"><a class="nav-link" onclick="navegar('clientes', this)"><i class="bi bi-person-badge me-2"></i>Clientes</a></li>
        <li class="nav-item"><a class="nav-link" onclick="navegar('vendas', this)"><i class="bi bi-cart4 me-2"></i>Vendas</a></li>
        <li class="nav-item"><a class="nav-link" onclick="navegar('ajustesprecos', this)"><i class="bi bi-tags me-2"></i>Ajustes Preços</a></li>
        <li class="nav-item"><a class="nav-link" onclick="navegar('estoque', this)"><i class="bi bi-bar-chart-line me-2"></i>Estoque</a></li>
    <li class="nav-item"><a class="nav-link" onclick="navegar('etiquetas', this)"><i class="bi bi-tags me-2"></i>Etiquetas</a></li>
        <!-- Botão PDV estilizado (rápido) -->
        <li class="nav-item mt-3">
            <button class="btn btn-success w-100 fw-bold" onclick="abrirPDV()"><i class="bi bi-cash-stack me-2"></i>ABRIR PDV</button>
        </li>
    </ul>
    <!-- Sair + botão extra abaixo -->
    <div style="position:absolute;bottom:20px;left:0;right:0;padding:0 12px;">
        <div class="d-grid">
            <a class="nav-link text-danger text-center" style="border-radius:6px;padding:8px;background:transparent;" onclick="fecharPrograma()"><i class="bi bi-box-arrow-right me-2"></i>Sair</a>
        </div>
        <div class="d-grid mt-2">
            <button id="btn-below-sair" class="btn btn-outline-light w-100">Ação Rápida</button>
        </div>
    </div>
</nav>

<main id="conteudo-dinamico"></main>

<!-- Modal PDV Login (CPF) -->
<div class="modal fade" id="pdvLoginModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Login Operador (CPF)</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-2">
                    <label class="form-label small">CPF</label>
                    <input id="pdv-login-cpf" class="form-control" placeholder="Apenas números" />
                </div>
                <div id="pdv-login-msg" class="small text-danger" style="display:none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" id="pdv-login-submit" class="btn btn-primary">Entrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const fs = require('fs');
    const path = require('path');

    function logger(msg, tipo = 'info') {
        console.log(`%c[DEBUG] ${msg}`, `color: ${tipo === 'error' ? 'red' : 'cyan'}`);
    }

    async function navegar(pagina, elemento) {
        logger(`Navegando para: ${pagina}`);

        // 1. Atualizar visual do menu de forma robusta
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        // Se passarmos o 'this' no clique, usamos ele. Se não (como no onload), buscamos pelo nome.
        if (elemento) {
            elemento.classList.add('active');
        } else {
            const link = Array.from(document.querySelectorAll('.nav-link')).find(l => l.getAttribute('onclick').includes(pagina));
            if(link) link.classList.add('active');
        }

        // 2. Definir caminho do arquivo (Ajuste conforme sua estrutura de pastas)
        // Se seus arquivos HTML estão na mesma pasta do index.html, mantenha como está.
        const caminhoArquivo = path.join(__dirname, `${pagina}.html`);

        try {
            if (fs.existsSync(caminhoArquivo)) {
                const html = fs.readFileSync(caminhoArquivo, 'utf-8');
                const container = document.getElementById('conteudo-dinamico');
                
                // Injetar o HTML
                container.innerHTML = html;

                // 3. FORÇAR EXECUÇÃO DE SCRIPTS
                const scripts = container.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript).parentNode.removeChild(newScript);
                });

                logger(`Página ${pagina}.html carregada!`, 'success');
            } else {
                throw new Error(`Arquivo não encontrado: ${caminhoArquivo}`);
            }
        } catch (err) {
            logger(`Erro: ${err.message}`, 'error');
            document.getElementById('conteudo-dinamico').innerHTML = `
                <div class="alert alert-danger">
                    <h4>Erro ao carregar página</h4>
                    <p>${err.message}</p>
                </div>`;
        }
    }

    // Carregar página inicial ao abrir
    window.onload = () => navegar('inicio');
    
    // Função para fechar o programa via main
    function fecharPrograma(){
        try{
            const { ipcRenderer } = require('electron');
            ipcRenderer.send('app-quit');
        }catch(e){ console.error('Não foi possível enviar app-quit:', e); }
    }

    // PDV: pede CPF, entra no modo PDV e carrega pdv.html
    function abrirPDV(){
        // abrir modal de login
        const modalEl = document.getElementById('pdvLoginModal');
        const modal = new bootstrap.Modal(modalEl);
        document.getElementById('pdv-login-cpf').value = '';
        document.getElementById('pdv-login-msg').style.display = 'none';
        modal.show();
    }

    // handler do botão Entrar do modal
    document.addEventListener('DOMContentLoaded', ()=>{
        const submit = document.getElementById('pdv-login-submit');
        submit?.addEventListener('click', async ()=>{
            const cpf = document.getElementById('pdv-login-cpf').value.replace(/\D/g,'');
            if(!cpf){ document.getElementById('pdv-login-msg').innerText = 'Informe o CPF'; document.getElementById('pdv-login-msg').style.display='block'; return; }
            try{
                const { ipcRenderer } = require('electron');
                const pessoas = await ipcRenderer.invoke('get-pessoas', cpf, true);
                let operador = pessoas && pessoas.length? pessoas[0] : null;
                if(!operador){ document.getElementById('pdv-login-msg').innerText = 'Operador não encontrado'; document.getElementById('pdv-login-msg').style.display='block'; return; }
                // salvar e entrar
                localStorage.setItem('pdvOperatorCPF', cpf);
                localStorage.setItem('pdvOperatorID', operador.Id || operador.Id);
                const modal = bootstrap.Modal.getInstance(document.getElementById('pdvLoginModal'));
                modal.hide();
                enterPDV();
            }catch(e){ console.error(e); document.getElementById('pdv-login-msg').innerText = 'Erro na busca'; document.getElementById('pdv-login-msg').style.display='block'; }
        });
    });

    function enterPDV(){
        document.body.classList.add('pdv-mode');
        // carregar a página PDV
        navegar('pdv');
    }

    function exitPDV(){
        document.body.classList.remove('pdv-mode');
        localStorage.removeItem('pdvOperatorCPF');
        navegar('inicio');
    }
</script>
</body>
</html>
